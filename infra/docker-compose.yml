services:
  postgres:
    image: postgres:16-alpine
    container_name: lcos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lcos
      POSTGRES_PASSWORD: lcos
      POSTGRES_DB: lcos
    ports:
      - '5432:5432'
    volumes:
      - lcos_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lcos']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lcos-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - lcos_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lcos_pg:
  lcos_redis:
